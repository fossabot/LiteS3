<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">

  <defs>
    <linearGradient id="apple-matte" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1c" />
      <stop offset="100%" stop-color="#0c0c0d" />
    </linearGradient>

    <linearGradient id="aluminum-white" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#eeeef1" />
    </linearGradient>

    <filter id="ambient-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.7" />
    </filter>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#apple-matte)" />

  <g filter="url(#ambient-shadow)">

    <g transform="translate(256, 256)" stroke="#ffffff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">

      <path d="M 0,0 L 130,-75 L 130,75 L 0,150 Z" fill="url(#aluminum-white)" />

      <path d="M 0,-150 L 130,-75 L 0,0 L -130,-75 Z" fill="#ffffff" fill-opacity="0.2" />

      <path d="M 0,0 L -130,-75 L -130,75 L 0,150 Z" fill="#ffffff" fill-opacity="0.05" />
      
      <line x1="0" y1="-150" x2="0" y2="0" stroke-dasharray="12 14" opacity="0.45" />
      <line x1="-130" y1="75" x2="0" y2="0" opacity="0.3" />

    </g>
  </g>
</svg>
